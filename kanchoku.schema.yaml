# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
    schema_id: kanchoku
    name: 漢直
    version: "0.0"
    author:
        - 陳林 <1chen0bryan@gmail.com>
    #dependencies:

switches:
  - name: ascii_mode
    reset: 0
    states: [ 日, A ]
  - name: half_shape
    states: [ 半角, 全角 ]
    reset: 0
  - name: katakana
    reset: 0
    states: [ ひらがな, カタカナ ]
  - name: kanji_mode
    states: [ かな, 漢字 ]

engine:
  processors:
    - lua_processor@*kanchoku*proc@kanchoku_processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - table_translator@kanji
  filters:
    - uniquifier
    - simplifier@katakana
    - lua_filter@*kanchoku*filter@kanchoku_filter

katakana:
  opencc_config: katakana.json
  option_name: katakana
  tips: none
  inherit_comment: false

menu:
  page_size: 5

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA~`1234567890!@#$%^&*()-_+=[]{}\|:;"',.<>/?
  initials: "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA"
  delimiter: " '"

translator:
  dictionary: romaji-kana
  initial_quality: 1

kanji:
  dictionary: kanchoku-cangjie5
  initial_quality: 2

punctuator:
  import_preset: default
  full_shape: &symbols
    '.': {commit: 。 }
    ',': {commit: 、 }
    #'/': ・
    '/': か
    '\K': か
    '=': [ ゝ, ゞ ]
    '+': [ ヽ, ヾ ]
  half_shape: *symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: minus, send: minus }
    - { when: has_menu, accept: equal, send: equal }
    - { when: paging, accept: comma, send: comma }
    - { when: has_menu, accept: period, send: period }
    - { when: has_menu, accept: Tab, toggle: katakana }
    - { when: has_menu, accept: Escape, toggle: kanji_mode }

recognizer:
  import_preset: default

ascii_composer:
  good_old_caps_lock: false
  switch_key:
    Caps_Lock: noop
    Eisu_toggle: clear

editor:
  bindings:
    Caps_Lock: confirm
    Return: confirm
